categories:
  - id: "автоматизація"
    description: "Запити на автоматизацію ручного або повторюваного процесу"
    examples: ["автоматизувати щотижневий звіт"]
  - id: "інтеграція"
    description: "Запити на з'єднання двох або більше систем/сервісів"
    examples: ["інтеграція Slack з PlanFix"]
  - id: "звіт/аналітика"
    description: "Запити на звіти, дашборди, вивантаження даних"
    examples: ["вивантажити список контрагентів"]
  - id: "баг/підтримка"
    description: "Щось зламалось або працює некоректно"
    examples: ["зламалась автоматизація по інвойсам"]
  - id: "питання/консультація"
    description: "Теоретичне питання, перевірка feasibility"
    examples: ["чи можна за допомогою AI оцінювати якість статей"]
  - id: "поза скоупом"
    description: "Не стосується роботи AI-юніту"
    examples: ["хотіли б закупити ноутбук"]

departments:
  - id: "маркетинг"
    aliases: ["marketing", "SMM", "контент", "PPC", "SEO"]
  - id: "продажі"
    aliases: ["sales", "відділ продажів"]
  - id: "аналітика"
    aliases: ["analytics", "BI"]
  - id: "HR"
    aliases: ["human resources", "рекрутинг"]
  - id: "PM"
    aliases: ["project management"]
  - id: "фінанси/бухгалтерія"
    aliases: ["finance", "accounting"]
  - id: "розробка"
    aliases: ["development", "dev", "engineering"]
  - id: "підтримка"
    aliases: ["support", "саппорт"]
  - id: "адміністративний"
    aliases: ["administration", "адміністрація"]    

priority_rules:
  high:
    description: "Явні маркери терміновості або зламані продакшн-системи"
    markers: ["горить", "терміново", "ASAP", "сьогодні", "urgent", "зламалось", "не працює"]
  medium:
    description: "Є дедлайн або бізнес-потреба, але не термінове"
    markers: ["до кінця місяця", "потрібно", "треба", "хочемо"]
  low:
    description: "Дослідницьке, теоретичне, nice-to-have, без дедлайну"
    markers: ["не горить", "цікаво", "теоретичне"]
